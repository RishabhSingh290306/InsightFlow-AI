services:
  - type: web
    name: insightflow-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        value: https://xoubukbpednfrfzrvjev.supabase.co
      - key: SUPABASE_BUCKET
        value: dataset-uploads
      - key: PORT
        value: "8000"
      # Secrets — set once in the Render dashboard (sync: false keeps them out
      # of this file and out of git). Values are provided at deploy time.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false
